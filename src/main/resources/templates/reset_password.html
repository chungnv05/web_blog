<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .container { width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .error { color: red; margin-bottom: 10px; }
        input[type="password"] { width: 100%; padding: 8px; margin: 10px 0; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Đặt lại mật khẩu mới</h2>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            
            <p>Nhập mật khẩu mới:</p>
            <input type="password" name="password" id="password" placeholder="Mật khẩu mới" required>
            
            <p>Nhập lại mật khẩu mới:</p>
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Nhập lại mật khẩu" required oninput="checkPasswordMatch(this)">
            
            <button type="submit">Đổi mật khẩu</button>
        </form>
    </div>

    <script>
        function checkPasswordMatch(fieldConfirmPassword) {
            if (fieldConfirmPassword.value != document.getElementById("password").value) {
                fieldConfirmPassword.setCustomValidity("Mật khẩu không khớp!");
            } else {
                fieldConfirmPassword.setCustomValidity("");
            }
        }
    </script>
</body>
</html>

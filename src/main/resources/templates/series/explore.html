<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Danh sách Series - Blog</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f0fdf4 0%, #f0f9ff 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    .container-explore {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .header-section {
      background: linear-gradient(135deg, #2f8f6a 0%, #1e5e4a 100%);
      color: white;
      padding: 60px 40px;
      border-radius: 24px;
      margin-bottom: 60px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(47, 143, 106, 0.3);
      position: relative;
      overflow: hidden;
    }

    .header-section::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      pointer-events: none;
    }

    .header-section::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -5%;
      width: 400px;
      height: 400px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      pointer-events: none;
    }

    .header-section h1 {
      margin: 0 0 16px 0;
      font-size: 42px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
      position: relative;
      z-index: 1;
      line-height: 1.2;
    }

    .header-section p {
      margin: 0;
      font-size: 18px;
      opacity: 0.95;
      font-weight: 400;
      position: relative;
      z-index: 1;
      letter-spacing: 0.3px;
    }

    .series-explore-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      margin-bottom: 60px;
    }

    @media (max-width: 768px) {
      .series-explore-grid {
        grid-template-columns: 1fr;
      }
    }

    .series-explore-card {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-top: 6px solid #2f8f6a;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .series-explore-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(47, 143, 106, 0.08), transparent);
      transition: left 0.6s ease;
    }

    .series-explore-card:hover::before {
      left: 100%;
    }

    .series-explore-card:hover {
      transform: translateY(-12px) translateX(2px);
      box-shadow: 0 20px 50px rgba(47, 143, 106, 0.18);
    }

    .series-explore-card h3 {
      margin: 0 0 14px 0;
      font-size: 22px;
      color: #1f2937;
      font-weight: 700;
      line-height: 1.4;
      position: relative;
      z-index: 2;
      word-break: break-word;
    }

    .series-explore-category {
      display: inline-block;
      background: linear-gradient(135deg, #d0f0e0 0%, #c0e8d8 100%);
      color: #1e5e4a;
      padding: 7px 16px;
      border-radius: 24px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      width: fit-content;
      position: relative;
      z-index: 2;
      box-shadow: 0 2px 8px rgba(47, 143, 106, 0.1);
    }

    .series-explore-description {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 18px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      position: relative;
      z-index: 2;
      font-weight: 400;
    }

    .series-explore-owner {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 14px;
      position: relative;
      z-index: 2;
      font-weight: 500;
    }

    .series-explore-owner strong {
      color: #2f8f6a;
      font-weight: 700;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .series-explore-owner strong:hover {
      color: #1e5e4a;
    }

    .series-explore-stats {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: #6b7280;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
      position: relative;
      z-index: 2;
      font-weight: 500;
    }

    .series-explore-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.3s ease;
    }

    .series-explore-card:hover .series-explore-stat {
      color: #2f8f6a;
    }

    .series-explore-stat strong {
      color: #2f8f6a;
      font-weight: 700;
    }

    .empty-state {
      background: white;
      padding: 100px 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
    }

    .empty-state h2 {
      font-size: 28px;
      color: #1f2937;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 16px;
      color: #6b7280;
      margin: 12px 0;
      font-weight: 400;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 30px;
      padding: 11px 20px;
      background: white;
      color: #2f8f6a;
      border: 2px solid #2f8f6a;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .back-link:hover {
      background: #2f8f6a;
      color: white;
      transform: translateX(-5px);
      box-shadow: 0 8px 20px rgba(47, 143, 106, 0.2);
    }

    header .back-link {
      color: white;
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.1);
    }

    header .back-link:hover {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border-color: white;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">📖 Blog</div>
      <a th:href="@{/}" class="back-link" style="color:#fff;">← Quay lại trang chủ</a>
    </div>
  </header>

  <div class="container-explore">

    <div class="header-section">
      <h1>📚 Danh sách tất cả Series</h1>
      <p>Khám phá các series bài viết được chia sẻ trong cộng đồng</p>
    </div>

    <!-- Danh sách series -->
    <div th:if="${!#lists.isEmpty(seriesList)}" class="series-explore-grid">
      <a th:each="series : ${seriesList}" th:href="@{/series/{id}(id=${series.id})}" class="series-explore-card">
        <div th:if="${series.category}">
          <span class="series-explore-category" th:text="${series.category}"></span>
        </div>
        <h3 th:text="${series.title}"></h3>

        <p class="series-explore-owner">
          ✍️ Tác giả: <strong th:text="${series.owner.name}"></strong>
        </p>

        <div th:if="${series.description}" class="series-explore-description" th:text="${series.description}"></div>

        <div class="series-explore-stats">
          <div class="series-explore-stat">
            <span>📚</span>
            <span>Bài viết: <strong th:text="${series.articles != null ? series.articles.size() : 0}"></strong></span>
          </div>
        </div>
      </a>
    </div>

    <!-- Trạng thái rỗng -->
    <div th:if="${#lists.isEmpty(seriesList)}" class="empty-state">
      <p style="font-size: 48px;">📭</p>
      <h2 style="color: #1f2937; margin-top: 0;">Chưa có series nào</h2>
      <p>Hãy quay lại sau, hoặc tạo series đầu tiên của bạn</p>
    </div>
  </div>
</body>
</html>

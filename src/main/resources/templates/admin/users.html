<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 Quản lý Người dùng - Blog</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">Quản lý Người dùng</div>
            <a th:href="@{/admin}" class="back-link" style="color:#fff;">← Dashboard</a>
            <a th:href="@{/}" class="back-link" style="color:#fff;">← Trang chủ</a>
        </div>
    </header>

    <main class="admin-shell">
        <section class="admin-table-wrap">
            <h2>Danh sách người dùng</h2>

            <div th:if="${message}" style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:10px;padding:16px;margin-bottom:20px;color:#065f46;font-weight:600;">
                <span th:text="${message}"></span>
            </div>

            <table>
                <tr>
                    <th>ID</th>
                    <th>Tên đăng nhập</th>
                    <th>Email</th>
                    <th>Vai trò</th>
                    <th>Hành động</th>
                </tr>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td><a th:href="@{/users/{id}(id=${user.id})}" style="color:#059669;text-decoration:none;font-weight:600;cursor:pointer;transition:all 0.3s;" onmouseover="this.style.color='#10b981'" onmouseout="this.style.color='#059669'" th:text="${user.username}"></a></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.role}"></td>
                    <td>
                        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="inline-form">
                            <button type="submit" class="danger">Xóa</button>
                        </form>
                    </td>
                </tr>
            </table>
        </section>
    </main>
</body>
</html>

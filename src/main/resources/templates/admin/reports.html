<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Báo cáo - Blog</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .report-item {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.1);
            border-left: 5px solid #ef4444;
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 16px;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .report-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 45px rgba(239, 68, 68, 0.15);
            border-left-color: #dc2626;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .report-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            flex: 1;
        }

        .report-date {
            font-size: 12px;
            color: #64748b;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .report-section {
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid #e2e8f0;
        }

        .report-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .report-label {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .report-value {
            font-size: 14px;
            color: #1f2937;
            line-height: 1.6;
        }

        .report-user {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e40af;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-block;
            margin-top: 6px;
        }

        .report-reason {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-block;
            margin-top: 6px;
        }

        .report-article-link {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #059669;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 6px;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .report-article-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }

        .report-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .report-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex: 1;
            min-width: 120px;
        }

        .btn-view {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
        }

        .btn-view:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2);
        }

        .btn-delete {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
        }

        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(239, 68, 68, 0.2);
        }

        .reports-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .admin-header h1 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">Quản lý báo cáo </div>
            <a th:href="@{/admin}" class="back-link" style="color:#fff;">← Dashboard</a>
            <a th:href="@{/}" class="back-link" style="color:#fff;">← Trang chủ</a>
        </div>
    </header>

    <main class="admin-shell">
        <div class="admin-header">
            <h1>Xem và xử lý các báo cáo vi phạm từ người dùng</h1>
        </div>

        <div class="reports-list">
            <div th:if="${reports.empty}" class="empty-state">
                <p>Chưa có báo cáo nào trong hệ thống.</p>
            </div>

            <div th:each="report : ${reports}" class="report-item">
                <div class="report-header">
                    <div class="report-title" th:text="'Báo cáo #' + ${report.id}"></div>
                    <div class="report-date" th:text="${#temporals.format(report.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
                </div>

                <div class="report-section">
                    <div class="report-label">Người báo cáo</div>
                    <div class="report-user" th:text="${report.user.name}"></div>
                </div>

                <div class="report-section">
                    <div class="report-label">Bài viết bị báo cáo</div>
                    <div class="report-value" th:text="${report.article.title}"></div>
                </div>

                <div class="report-section">
                    <div class="report-label">Lý do và Chi tiết</div>
                    <div class="report-value" th:text="${report.content}"></div>
                </div>

                <div class="report-actions">
                    <a th:href="@{/articles/{id}(id=${report.article.id})}" class="report-btn btn-view">
                        Xem bài viết
                    </a>
                    <form th:action="@{/admin/reports/{id}/delete(id=${report.id})}" method="post" style="flex: 1; min-width: 120px;">
                        <button type="submit" class="report-btn btn-delete" onclick="return confirm('Bạn chắc chắn muốn xóa báo cáo này?')">
                            Xóa báo cáo
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>

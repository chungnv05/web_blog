<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${user.name} + ' - 👤 Hồ sơ - Blog'">Người dùng - Blog</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">📖 Blog</div>
      <a th:href="@{/}" class="back-link" style="color:#fff;">← Quay lại trang chủ</a>
    </div>
  </header>

  <div class="container two-col">
    <aside class="sidebar">
      <div class="user-avatar" style="height:150px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2f8f6a,#3ba17a);border-radius:12px;color:#fff;font-size:48px;">👤</div>
      <h2 th:text="${user.name}"></h2>

      <div class="info-item" th:if="${isOwner}">
        <div class="info-label">Tên đăng nhập:</div>
        <div class="info-value" th:text="${user.username}"></div>
      </div>

      <div class="info-item">
        <div class="info-label">Email:</div>
        <div class="info-value" th:text="${user.email}"></div>
      </div>

      <div th:if="${user.gender}" class="info-item">
        <div class="info-label">Giới tính:</div>
        <div class="info-value" th:text="${user.gender}"></div>
      </div>

      <div th:if="${user.birth}" class="info-item">
        <div class="info-label">Ngày sinh:</div>
        <div class="info-value" th:text="${#temporals.format(user.birth,'dd/MM/yyyy')}"></div>

      </div>

      <div class="mark-badge">
        Điểm: <span th:text="${user.mark}"></span>
      </div>

      <div th:if="${isAdmin}" style="display:flex;flex-direction:column;gap:10px;margin-top:16px;">
        <form th:action="@{/admin/users/{id}/warn(id=${user.id})}" method="post" style="width:100%;">
          <button type="submit" onclick="return confirm('Cảnh cáo người dùng này? Họ sẽ bị trừ 5 điểm.')"
                  style="width:100%;padding:12px;border:1px solid #f59e0b;background:#fef3c7;color:#92400e;border-radius:10px;cursor:pointer;font-weight:600;transition:all 0.3s;">
            CẢNH CÁO!
          </button>
        </form>

        <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" style="width:100%;">
          <button type="submit" onclick="return confirm('Xóa người dùng này? Tất cả bài viết của họ cũng sẽ bị xóa. Hành động này không thể hoàn tác!')"
                  style="width:100%;padding:12px;border:1px solid #ef4444;background:#fee2e2;color:#991b1b;border-radius:10px;cursor:pointer;font-weight:600;transition:all 0.3s;">
            XÓA NGƯỜI DÙNG
          </button>
        </form>
      </div>

      <a th:href="@{/}" class="back-btn">Quay lại</a>
    </aside>

    <main class="content">
      <h2>Bài viết của <span th:text="${user.name}"></span></h2>

       <div th:if="${#lists.isEmpty(user.articles)}" class="empty-state">
         <p><span th:text="${user.name}"></span> chưa viết bài viết nào</p>
       </div>

     <div th:if="${user.articles != null and !#lists.isEmpty(user.articles)}" class="articles-list">
       <a th:each="article : ${user.articles}"
          th:href="@{/articles/{id}(id=${article.id})}"
          class="article-item">
         <h3 th:text="${article.title}"></h3>
         <div class="article-meta">
           <span>Ngày: <span th:text="${#temporals.format(article.createdAt,'dd/MM/yyyy')}"></span></span>
           <span>Thích: <span th:text="${article.likes.size()}"></span></span>
           <span>Bình luận: <span th:text="${article.comments.size()}"></span></span>
         </div>
       </a>
     </div>

    </main>
  </div>
</body>

</html>

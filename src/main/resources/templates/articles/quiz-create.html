<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div th:fragment="quiz-form">
        <style>
            .builder-container {
                display: flex;
                height: 50vh;
                background-color: #f3f4f6;
                overflow: hidden;
                font-family: 'Segoe UI', system-ui, sans-serif;
            }

            .sidebar {
                width: 300px;
                background-color: #ffffff;
                border-right: 1px solid #e5e7eb;
                display: flex;
                flex-direction: column;
            }

            .sidebar-header {
                padding: 1.25rem;
                font-weight: bold;
                font-size: 1.1rem;
                border-bottom: 1px solid #e5e7eb;
                background: #fff;
            }

            .sidebar-content {
                flex: 1;
                overflow-y: auto;
                padding: 1rem;
            }

            .question-item {
                padding: 0.75rem;
                border: 1px solid #e5e7eb;
                border-radius: 0.5rem;
                margin-bottom: 0.75rem;
                cursor: pointer;
                background: #fff;
                transition: all 0.2s;
            }

            .question-item:hover {
                background-color: #f9fafb;
            }

            .question-item.active {
                border-color: #2563eb;
                background-color: #eff6ff;
                box-shadow: 0 0 0 1px #2563eb;
            }

            .q-number {
                font-size: 0.7rem;
                font-weight: bold;
                color: #2563eb;
                text-transform: uppercase;
            }

            .q-title {
                margin: 4px 0 0;
                font-size: 0.9rem;
                font-weight: 500;
                color: #374151;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .sidebar-footer {
                padding: 1rem;
                border-top: 1px solid #e5e7eb;
            }

            .main-editor {
                flex: 1;
                padding: 2rem;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .editor-card {
                width: 100%;
                max-width: 700px;
                background-color: #ffffff;
                padding: 2rem;
                border-radius: 0.75rem;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }

            .form-group {
                margin-bottom: 1.5rem;
            }

            .form-group label {
                display: block;
                font-weight: 600;
                margin-bottom: 0.5rem;
                color: #4b5563;
            }

            input[type="text"],
            select,
            textarea {
                width: 100%;
                padding: 0.6rem;
                border: 1px solid #d1d5db;
                border-radius: 0.375rem;
                box-sizing: border-box;
            }

            .options-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
                margin-top: 0.5rem;
            }

            .option-input {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .option-label {
                font-weight: bold;
                color: #6b7280;
            }

            .btn-add {
                width: 100%;
                background-color: #2563eb;
                color: white;
                padding: 0.6rem;
                border: none;
                border-radius: 0.375rem;
                cursor: pointer;
                font-weight: 600;
            }

            .btn-save {
                margin-top: 1.5rem;
                background-color: #10b981;
                color: white;
                padding: 0.75rem 2rem;
                border: none;
                border-radius: 0.375rem;
                cursor: pointer;
                font-weight: bold;
                float: right;
            }

            .hidden {
                display: none;
            }
        </style>
        <div class="builder-container">
            <div class="sidebar">
                <div class="sidebar-header">🧠 Trình tạo trắc nghiệm</div>
                <div id="question-list" class="sidebar-content">
                    <div class="question-item active" data-index="0" onclick="switchQuestion(0)">
                        <span class="q-number">Câu 1</span>
                        <p class="q-title" id="preview-0">Câu hỏi chưa đặt tên...</p>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <button type="button" onclick="addNewQuestion()" class="btn-add">+ Thêm câu hỏi</button>
                </div>
            </div>

            <div class="main-editor">
                <div id="questions-container">

                    <div class="question-block" id="block-0">
                        <div class="form-group">
                            <label>Nội dung câu hỏi</label>
                            <textarea name="quiz.questions[0].questionText" onblur="updatePreview(0, this.value)"
                                placeholder="Nhập nội dung câu hỏi..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Các lựa chọn đáp án</label>
                            <div class="options-grid">
                                <div class="option-input">
                                    <span class="option-label">A</span>
                                    <input type="text" name="quiz.questions[0].options[0]" placeholder="Đáp án A">
                                </div>
                                <div class="option-input">
                                    <span class="option-label">B</span>
                                    <input type="text" name="quiz.questions[0].options[1]" placeholder="Đáp án B">
                                </div>
                                <div class="option-input">
                                    <span class="option-label">C</span>
                                    <input type="text" name="quiz.questions[0].options[2]" placeholder="Đáp án C">
                                </div>
                                <div class="option-input">
                                    <span class="option-label">D</span>
                                    <input type="text" name="quiz.questions[0].options[3]" placeholder="Đáp án D">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Đáp án đúng</label>
                            <select name="quiz.questions[0].correctIndex">
                                <option value="0">Đáp án A</option>
                                <option value="1">Đáp án B</option>
                                <option value="2">Đáp án C</option>
                                <option value="3">Đáp án D</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            let questionCount = 1;

            function switchQuestion(index) {
                document.querySelectorAll('.question-item').forEach(el => el.classList.remove('active'));
                document.querySelector(`.question-item[data-index="${index}"]`).classList.add('active');

                document.querySelectorAll('.question-block').forEach(el => el.classList.add('hidden'));
                document.getElementById(`block-${index}`).classList.remove('hidden');
            }

            function addNewQuestion() {
                const index = questionCount;

                // 1. Thêm vào Sidebar
                const sideBarList = document.getElementById('question-list');
                const newItem = document.createElement('div');
                newItem.className = 'question-item';
                newItem.setAttribute('data-index', index);
                newItem.setAttribute('onclick', `switchQuestion(${index})`);
                newItem.innerHTML = `
                    <span class="q-number">Câu ${index + 1}</span>
                    <p class="q-title" id="preview-${index}">Câu hỏi chưa đặt tên...</p>
                `;
                sideBarList.appendChild(newItem);

                // 2. Thêm vào Editor Container
                const container = document.getElementById('questions-container');
                const newBlock = document.createElement('div');
                newBlock.className = 'question-block hidden';
                newBlock.id = `block-${index}`;
                newBlock.innerHTML = `
                    <div class="form-group">
                        <label>Nội dung câu hỏi</label>
                        <textarea name="quiz.questions[${index}].questionText" 
                                  oninput="updatePreview(${index}, this.value)" 
                                  placeholder="Nhập nội dung câu hỏi..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Các lựa chọn đáp án</label>
                        <div class="options-grid">
                            ${['A','B','C','D'].map((lab, i) => `
                                <div class="option-input">
                                    <span class="option-label">${lab}</span>
                                    <input type="text" name="quiz.questions[${index}].options[${i}]" placeholder="Đáp án ${lab}">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Đáp án đúng</label>
                        <select name="quiz.questions[${index}].correctIndex">
                            <option value="0">Đáp án A</option>
                            <option value="1">Đáp án B</option>
                            <option value="2">Đáp án C</option>
                            <option value="3">Đáp án D</option>
                        </select>
                    </div>
                `;
                container.appendChild(newBlock);

                questionCount++;
                switchQuestion(index);

                // Tự động cuộn sidebar xuống dưới cùng
                sideBarList.scrollTop = sideBarList.scrollHeight;
            }
            function clearQuizData(){
                document.getElementById('questions-container').innerHTML='';
                document.getElementById('question-list').innerHTML = '';
                questionCount=0;
            }
        </script>
    </div>

</body>

</html>

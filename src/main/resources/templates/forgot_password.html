<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .container { width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .message { color: green; margin-bottom: 10px; }
        .error { color: red; margin-bottom: 10px; }
        input[type="email"] { width: 100%; padding: 8px; margin: 10px 0; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Quên mật khẩu</h2>
        <div th:if="${message}" class="message" th:text="${message}"></div>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <p>Nhập email của bạn để nhận link đặt lại mật khẩu:</p>
        <form th:action="@{/forgot-password}" method="post">
            <input type="email" name="email" placeholder="Email của bạn" required>
            <button type="submit">Gửi link</button>
        </form>
        <p><a th:href="@{/login}">Quay lại đăng nhập</a></p>
    </div>
</body>
</html>
